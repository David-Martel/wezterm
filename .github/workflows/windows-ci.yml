name: Windows CI

on:
  push:
    branches: [main]
    paths:
      - 'wezterm-fs-explorer/**'
      - 'wezterm-watch/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/windows-ci.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache

jobs:
  build-test:
    name: Build and Test
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.4
        with:
          version: "v0.7.7"

      - name: Cache cargo registry and git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: windows-cargo-${{ hashFiles('**/Cargo.lock', '.cargo/config.toml') }}
          restore-keys: |
            windows-cargo-

      - name: Cache dev tool binaries (nextest, ast-grep)
        id: tool-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-nextest*
            ~/.cargo/bin/sg*
            ~/.cargo/bin/ast-grep*
          key: windows-tools-nextest-astgrep-v1

      - name: Install nextest
        if: steps.tool-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${env:CARGO_HOME}\..\bin
          curl -LsSf https://get.nexte.st/latest/windows | tar zxf - -C ${env:CARGO_HOME}\..\bin

      - name: Install ast-grep
        if: steps.tool-cache.outputs.cache-hit != 'true'
        run: cargo install ast-grep --locked
        env:
          RUSTC_WRAPPER: ""

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run ast-grep
        run: pwsh -NoLogo -NoProfile -File tools/hooks/Invoke-AstGrep.ps1 -Mode scan -Profile safe-gate

      - name: Build workspace
        run: cargo build --workspace --verbose

      - name: Build custom utilities
        run: |
          cargo build --release -p wezterm-fs-explorer
          cargo build --release -p wezterm-watch

      - name: Run tests
        run: cargo nextest run --workspace --no-fail-fast

      - name: Run clippy (without sccache wrapper)
        run: pwsh -NoLogo -NoProfile -File tools/hooks/Invoke-WorkspaceRustChecks.ps1 -Task clippy
        env:
          RUSTC_WRAPPER: ""

      - name: Show sccache stats
        run: sccache --show-stats

  release:
    name: Create Release
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-test
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.4
        with:
          version: "v0.7.7"

      - name: Cache cargo registry and git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: windows-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-cargo-release-
            windows-cargo-

      - name: Build release binaries
        run: |
          cargo build --release -p wezterm-fs-explorer
          cargo build --release -p wezterm-watch

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          echo "version=$tag" >> $env:GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $prevTag = git describe --tags --abbrev=0 $tag^ 2>$null

          if ($prevTag) {
            $changes = git log --oneline --pretty=format:"- %s (%h)" $prevTag..$tag
          } else {
            $changes = git log --oneline --pretty=format:"- %s (%h)" $tag
          }

          $changelog = @"
          ## Changes in $tag

          $changes
          "@

          # Escape multiline output for GitHub Actions
          $changelog = $changelog -replace "`r`n","%0A" -replace "`n","%0A"
          echo "content=$changelog" >> $env:GITHUB_OUTPUT

      - name: Package binaries
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $artifactDir = "wezterm-utils-$version-windows-x64"

          New-Item -ItemType Directory -Path $artifactDir

          # Copy binaries from shared target directory
          $targetDir = "$env:USERPROFILE\.cargo\shared-target\release"
          if (Test-Path $targetDir) {
            Copy-Item "$targetDir\wezterm-fs-explorer.exe" $artifactDir\
            Copy-Item "$targetDir\wezterm-watch.exe" $artifactDir\
          } else {
            # Fallback to local target
            Copy-Item "target\release\wezterm-fs-explorer.exe" $artifactDir\
            Copy-Item "target\release\wezterm-watch.exe" $artifactDir\
          }

          # Copy README files
          Copy-Item "wezterm-fs-explorer\README.md" "$artifactDir\README-fs-explorer.md"
          Copy-Item "wezterm-watch\README.md" "$artifactDir\README-watch.md"

          # Create archive
          Compress-Archive -Path $artifactDir -DestinationPath "$artifactDir.zip"

          # Calculate checksums
          $hash = Get-FileHash -Algorithm SHA256 "$artifactDir.zip"
          "$($hash.Hash)  $artifactDir.zip" | Out-File -FilePath "$artifactDir.zip.sha256" -Encoding ASCII

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.content }}
          files: |
            wezterm-utils-${{ steps.version.outputs.version }}-windows-x64.zip
            wezterm-utils-${{ steps.version.outputs.version }}-windows-x64.zip.sha256
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
