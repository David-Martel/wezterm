id: avoid-sync-mutex-in-async
language: Rust
severity: warning
message: "Review std::sync::Mutex usage in async-adjacent Rust code; prefer tokio::sync::Mutex when the lock can live on async paths."
rule:
  any:
    - pattern: std::sync::Mutex
    - pattern: std::sync::Mutex::new($EXPR)
note: "This scan is intentionally conservative: ast-grep cannot prove whether a std::sync::Mutex guard crosses an await point. Confirm the call path before changing behavior."
