id: todo-macro
message: todo!() will panic at runtime - implement or return error
severity: warning
language: rust
rule:
  all:
    - pattern: todo!($$$ARGS)
    - not:
        inside:
          pattern: |
            #[cfg(test)]
            mod $MOD {
              $$$BODY
            }
    - not:
        inside:
          pattern: |
            #[test]
            fn $FUNC($$$PARAMS) {
              $$$BODY
            }
    - not:
        inside:
          pattern: |
            #[tokio::test]
            async fn $FUNC($$$PARAMS) {
              $$$BODY
            }
files:
  - "**/src/**/*.rs"
  - "!**/tests/**"
  - "!**/*_test.rs"
  - "!**/test_*.rs"
  - "!**/_backup*/**"
note: |
  todo!() panics at runtime. Consider:
  - Implementing the functionality
  - Returning an error: anyhow::bail!("not yet implemented")
  - Using a Result return type
