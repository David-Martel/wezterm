id: unwrap-call
message: unwrap() will panic on None/Err - use ? operator or explicit error handling
severity: error
language: rust
rule:
  pattern: $EXPR.unwrap()
  not:
    any:
      - inside:
          kind: function_item
          has:
            kind: attribute_item
            regex: "test"
      # Don't match unwrap_or, unwrap_or_else, unwrap_or_default
      - follows:
          regex: "unwrap_or"
files:
  - "**/src/**/*.rs"
  - "!**/tests/**"
  - "!**/*_test.rs"
  - "!**/test_*.rs"
  - "!**/_backup*/**"
  - "!**/benches/**"
note: |
  Example fixes:
  1. Use ? operator: value.some_method()?
  2. Use unwrap_or: value.unwrap_or(default)
  3. Use unwrap_or_else: value.unwrap_or_else(|| compute_default())
  4. Match explicitly:
     match value {
         Some(v) => v,
         None => return Err(Error::ValueMissing),
     }
