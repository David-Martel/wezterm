id: unwrap-call
message: unwrap() will panic on None/Err - use ? operator or explicit error handling
severity: error
language: rust
rule:
  all:
    - pattern: $EXPR.unwrap()
    - not:
        inside:
          pattern: |
            #[cfg(test)]
            mod $MOD {
              $$$BODY
            }
    - not:
        inside:
          pattern: |
            #[test]
            fn $FUNC($$$PARAMS) {
              $$$BODY
            }
    - not:
        inside:
          pattern: |
            #[tokio::test]
            async fn $FUNC($$$PARAMS) {
              $$$BODY
            }
files:
  - "**/src/**/*.rs"
  - "!**/tests/**"
  - "!**/*_test.rs"
  - "!**/test_*.rs"
  - "!**/_backup*/**"
note: |
  Example fixes:
  1. Use ? operator: value.some_method()?
  2. Use unwrap_or: value.unwrap_or(default)
  3. Use unwrap_or_else: value.unwrap_or_else(|| compute_default())
  4. Match explicitly:
     match value {
         Some(v) => v,
         None => return Err(Error::ValueMissing),
     }
