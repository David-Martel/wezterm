id: panic-macro
message: panic!() causes immediate program termination - return error instead
severity: error
language: rust
rule:
  all:
    - pattern: panic!($$$ARGS)
    - not:
        inside:
          pattern: |
            #[cfg(test)]
            mod $MOD {
              $$$BODY
            }
    - not:
        inside:
          pattern: |
            #[test]
            fn $FUNC($$$PARAMS) {
              $$$BODY
            }
    - not:
        inside:
          pattern: |
            #[tokio::test]
            async fn $FUNC($$$PARAMS) {
              $$$BODY
            }
files:
  - "**/src/**/*.rs"
  - "!**/tests/**"
  - "!**/*_test.rs"
  - "!**/test_*.rs"
  - "!**/_backup*/**"
note: |
  panic!() should only be used for truly unrecoverable errors.
  Most cases should return Result<T, Error> instead.
