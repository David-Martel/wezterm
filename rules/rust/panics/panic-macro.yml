id: panic-macro
message: panic!() causes immediate program termination - return error instead
severity: error
language: rust
rule:
  pattern: panic!($$$ARGS)
  not:
    inside:
      kind: function_item
      has:
        kind: attribute_item
        regex: "test"
files:
  - "**/src/**/*.rs"
  - "!**/tests/**"
  - "!**/*_test.rs"
  - "!**/test_*.rs"
  - "!**/_backup*/**"
  - "!**/benches/**"
note: |
  panic!() terminates the program. Use Result for recoverable errors:
  - anyhow::bail!("reason") for application code
  - return Err(MyError::...) for library code
  - Only acceptable in tests (#[test] functions)
