# Cargo configuration for wezterm-utils-daemon

[build]
# Use shared target directory for faster builds across projects
# Disabled for now to avoid sccache issues
# target-dir = "C:\\Users\\david\\.cargo\\shared-target"

# Increase stack size on Windows
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "link-arg=/STACK:8388608"]

[env]
SCCACHE_DIR = "T:/RustCache/sccache"
SCCACHE_CACHE_SIZE = "30G"
SCCACHE_SERVER_PORT = "4226"
SCCACHE_CACHE_COMPRESSION = "zstd"

