# pre-commit configuration for WezTerm
# Install pre-commit:  pip install pre-commit  (or use pipx)
# Then enable:         pre-commit install --hook-type pre-commit --hook-type pre-push
# This will auto-format, lint and run lightweight checks prior to committing/pushing.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.8
    hooks:
      - id: ruff-format
        additional_dependencies: []
        files: "(^|/)ci/|(^|/)scripts/|(^|/)docs/"
        types_or: [python]
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: pwsh -NoLogo -NoProfile -File tools/hooks/Invoke-WorkspaceRustChecks.ps1 -Task fmt
        language: system
        pass_filenames: false
        types: [rust]
      - id: cargo-clippy
        name: cargo clippy (fast)
        entry: pwsh -NoLogo -NoProfile -File tools/hooks/Invoke-WorkspaceRustChecks.ps1 -Task clippy
        language: system
        pass_filenames: false
        types: [rust]
      - id: cargo-test-changed
        name: cargo test (changed crates quick)
        entry: pwsh -NoLogo -NoProfile -File tools/hooks/Invoke-WorkspaceRustChecks.ps1 -Task test-changed
        language: system
        pass_filenames: false
      - id: ast-grep-fix-safe
        name: ast-grep safe autofix
        entry: pwsh -NoLogo -NoProfile -File tools/hooks/Invoke-AstGrep.ps1 -Mode fix-safe -Staged
        language: system
        pass_filenames: false
        types: [rust]
      - id: ast-grep-scan
        name: ast-grep Rust scan
        entry: pwsh -NoLogo -NoProfile -File tools/hooks/Invoke-AstGrep.ps1 -Mode scan -Staged
        language: system
        pass_filenames: false
        types: [rust]
      - id: cargo-deny
        name: cargo deny check (advisories + licenses)
        entry: pwsh -NoLogo -NoProfile -File tools/hooks/Invoke-WorkspaceRustChecks.ps1 -Task deny
        language: system
        pass_filenames: false
      - id: mdbook-build
        name: mdBook build docs (link check only)
        entry: pwsh -NoLogo -NoProfile -File tools/hooks/Invoke-WorkspaceRustChecks.ps1 -Task mdbook
        language: system
        pass_filenames: false
      - id: doxygen-rust
        name: Doxygen (Rust) generate XML (fast subset)
        entry: pwsh -NoLogo -NoProfile -File tools/hooks/Invoke-WorkspaceRustChecks.ps1 -Task doxygen
        language: system
        pass_filenames: false

# Optional: extra hooks on pre-push
# Add a ["--hook-type","pre-push"] install to enable heavier tasks there.
  - repo: local
    hooks:
      - id: pre-push-ast-grep
        name: pre-push ast-grep workspace scan
        stages: [pre-push]
        entry: pwsh -NoLogo -NoProfile -File tools/hooks/Invoke-AstGrep.ps1 -Mode scan
        language: system
        pass_filenames: false
      - id: pre-push-clippy-full
        name: pre-push clippy (all features)
        stages: [pre-push]
        entry: pwsh -NoLogo -NoProfile -File tools/hooks/Invoke-WorkspaceRustChecks.ps1 -Task clippy-all-features
        language: system
        pass_filenames: false
      - id: pre-push-test-full
        name: pre-push test (all features)
        stages: [pre-push]
        entry: pwsh -NoLogo -NoProfile -File tools/hooks/Invoke-WorkspaceRustChecks.ps1 -Task test-full
        language: system
        pass_filenames: false
      - id: pre-push-deny
        name: pre-push cargo deny
        stages: [pre-push]
        entry: pwsh -NoLogo -NoProfile -File tools/hooks/Invoke-WorkspaceRustChecks.ps1 -Task deny
        language: system
        pass_filenames: false
      - id: pre-push-mdbook
        name: pre-push mdbook build
        stages: [pre-push]
        entry: pwsh -NoLogo -NoProfile -File tools/hooks/Invoke-WorkspaceRustChecks.ps1 -Task mdbook
        language: system
        pass_filenames: false
      - id: pre-push-doxygen
        name: pre-push doxygen (architecture)
        stages: [pre-push]
        entry: pwsh -NoLogo -NoProfile -File tools/hooks/Invoke-WorkspaceRustChecks.ps1 -Task doxygen
        language: system
        pass_filenames: false
